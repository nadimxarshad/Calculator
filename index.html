<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .calculator {
            background-color: #2d3436;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 320px;
        }

        .display {
            background-color: #1e272e;
            color: #00ff00;
            font-size: 2.5em;
            padding: 20px;
            border-radius: 10px;
            text-align: right;
            margin-bottom: 20px;
            min-height: 80px;
            word-wrap: break-word;
            word-break: break-all;
            border: 2px solid #636e72;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 1.5em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Number buttons */
        .number {
            background-color: #636e72;
            color: white;
        }

        .number:hover {
            background-color: #74b9ff;
            transform: scale(1.05);
        }

        .number:active {
            transform: scale(0.95);
        }

        /* Operator buttons */
        .operator {
            background-color: #fd79a8;
            color: white;
        }

        .operator:hover {
            background-color: #e84393;
            transform: scale(1.05);
        }

        .operator:active {
            transform: scale(0.95);
        }

        /* Clear button */
        .clear {
            background-color: #ff7675;
            color: white;
            grid-column: span 2;
        }

        .clear:hover {
            background-color: #d63031;
            transform: scale(1.05);
        }

        .clear:active {
            transform: scale(0.95);
        }

        /* Equals button */
        .equals {
            background-color: #00b894;
            color: white;
            grid-column: span 2;
        }

        .equals:hover {
            background-color: #00a383;
            transform: scale(1.05);
        }

        .equals:active {
            transform: scale(0.95);
        }

        /* Delete button */
        .delete {
            background-color: #fdcb6e;
            color: #2d3436;
        }

        .delete:hover {
            background-color: #f39c12;
            transform: scale(1.05);
        }

        .delete:active {
            transform: scale(0.95);
        }

        /* Decimal button */
        .decimal {
            background-color: #a29bfe;
            color: white;
        }

        .decimal:hover {
            background-color: #6c5ce7;
            transform: scale(1.05);
        }

        .decimal:active {
            transform: scale(0.95);
        }

        .title {
            text-align: center;
            color: #dfe6e9;
            margin-bottom: 20px;
            font-size: 1.5em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="title">Calculator</div>
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clear" id="clear">Clear</button>
            <button class="delete" id="delete">Del</button>
            <button class="operator" id="divide">÷</button>
            
            <button class="number" data-number="7">7</button>
            <button class="number" data-number="8">8</button>
            <button class="number" data-number="9">9</button>
            <button class="operator" id="multiply">×</button>
            
            <button class="number" data-number="4">4</button>
            <button class="number" data-number="5">5</button>
            <button class="number" data-number="6">6</button>
            <button class="operator" id="subtract">−</button>
            
            <button class="number" data-number="1">1</button>
            <button class="number" data-number="2">2</button>
            <button class="number" data-number="3">3</button>
            <button class="operator" id="add">+</button>
            
            <button class="number" data-number="0">0</button>
            <button class="decimal" id="decimal">.</button>
            <button class="equals" id="equals">=</button>
        </div>
    </div>

    <script>
        // Calculator state
        let display = document.getElementById('display');
        let currentValue = '0';
        let previousValue = '';
        let operation = null;
        let shouldResetDisplay = false;

        // Get all number buttons
        const numberButtons = document.querySelectorAll('.number');
        const operatorButtons = document.querySelectorAll('.operator');
        const equalsButton = document.getElementById('equals');
        const clearButton = document.getElementById('clear');
        const deleteButton = document.getElementById('delete');
        const decimalButton = document.getElementById('decimal');

        // Update display function
        function updateDisplay() {
            display.textContent = currentValue;
        }

        // Add event listeners to number buttons
        numberButtons.forEach(button => {
            button.addEventListener('click', function() {
                const number = this.getAttribute('data-number');
                
                if (shouldResetDisplay) {
                    currentValue = number;
                    shouldResetDisplay = false;
                } else {
                    currentValue = currentValue === '0' ? number : currentValue + number;
                }
                
                updateDisplay();
            });
        });

        // Add event listeners to operator buttons
        const operators = {
            'add': '+',
            'subtract': '-',
            'multiply': '*',
            'divide': '/'
        };

        Object.keys(operators).forEach(id => {
            document.getElementById(id).addEventListener('click', function() {
                if (operation !== null && !shouldResetDisplay) {
                    calculate();
                }
                
                previousValue = currentValue;
                operation = operators[id];
                shouldResetDisplay = true;
            });
        });

        // Calculate function
        function calculate() {
            if (operation === null || shouldResetDisplay) return;
            
            let result;
            const prev = parseFloat(previousValue);
            const current = parseFloat(currentValue);

            // Using if-else statements for different operations
            if (operation === '+') {
                result = prev + current;
            } else if (operation === '-') {
                result = prev - current;
            } else if (operation === '*') {
                result = prev * current;
            } else if (operation === '/') {
                if (current === 0) {
                    currentValue = 'Error';
                    updateDisplay();
                    return;
                }
                result = prev / current;
            }

            currentValue = result.toString();
            operation = null;
            shouldResetDisplay = true;
            updateDisplay();
        }

        // Equals button event listener
        equalsButton.addEventListener('click', function() {
            if (operation !== null && !shouldResetDisplay) {
                calculate();
            }
        });

        // Clear button event listener
        clearButton.addEventListener('click', function() {
            currentValue = '0';
            previousValue = '';
            operation = null;
            shouldResetDisplay = false;
            updateDisplay();
        });

        // Delete button (backspace)
        deleteButton.addEventListener('click', function() {
            if (currentValue !== '0' && !shouldResetDisplay) {
                currentValue = currentValue.slice(0, -1);
                if (currentValue === '') {
                    currentValue = '0';
                }
                updateDisplay();
            }
        });

        // Decimal button event listener
        decimalButton.addEventListener('click', function() {
            if (shouldResetDisplay) {
                currentValue = '0.';
                shouldResetDisplay = false;
            } else if (!currentValue.includes('.')) {
                currentValue += '.';
            }
            updateDisplay();
        });

        // Keyboard support
        document.addEventListener('keydown', function(e) {
            const key = e.key;
            
            // Number keys
            if (key >= '0' && key <= '9') {
                if (shouldResetDisplay) {
                    currentValue = key;
                    shouldResetDisplay = false;
                } else {
                    currentValue = currentValue === '0' ? key : currentValue + key;
                }
                updateDisplay();
            }
            
            // Operators
            if (key === '+' || key === '-') {
                if (operation !== null && !shouldResetDisplay) {
                    calculate();
                }
                previousValue = currentValue;
                operation = key;
                shouldResetDisplay = true;
            }
            
            if (key === '*') {
                e.preventDefault();
                if (operation !== null && !shouldResetDisplay) {
                    calculate();
                }
                previousValue = currentValue;
                operation = '*';
                shouldResetDisplay = true;
            }
            
            if (key === '/') {
                e.preventDefault();
                if (operation !== null && !shouldResetDisplay) {
                    calculate();
                }
                previousValue = currentValue;
                operation = '/';
                shouldResetDisplay = true;
            }
            
            // Decimal point
            if (key === '.') {
                if (shouldResetDisplay) {
                    currentValue = '0.';
                    shouldResetDisplay = false;
                } else if (!currentValue.includes('.')) {
                    currentValue += '.';
                }
                updateDisplay();
            }
            
            // Equals
            if (key === 'Enter' || key === '=') {
                e.preventDefault();
                if (operation !== null && !shouldResetDisplay) {
                    calculate();
                }
            }
            
            // Backspace
            if (key === 'Backspace') {
                if (currentValue !== '0' && !shouldResetDisplay) {
                    currentValue = currentValue.slice(0, -1);
                    if (currentValue === '') {
                        currentValue = '0';
                    }
                    updateDisplay();
                }
            }
            
            // Clear
            if (key === 'Escape') {
                currentValue = '0';
                previousValue = '';
                operation = null;
                shouldResetDisplay = false;
                updateDisplay();
            }
        });

        // Initialize display
        updateDisplay();
    </script>
</body>
</html>
